<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Agent Co-Pilot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px; min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0f172a; color: #f1f5f9; font-size: 13px;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid #1e293b;
    }
    .logo {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    .header-text p  { font-size: 10px; color: #475569; margin-top: 1px; }
    .content { padding: 14px 16px; }
    .form-group { margin-bottom: 12px; }
    label {
      display: block; font-size: 10px; font-weight: 600;
      color: #64748b; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px;
    }
    input {
      width: 100%; padding: 8px 10px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 7px; color: #f1f5f9; font-size: 13px;
      outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: #6366f1; }
    .btn {
      width: 100%; padding: 9px; border: none; border-radius: 7px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; line-height: 1;
    }
    .btn:hover  { opacity: 0.88; }
    .btn:active { opacity: 0.75; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #6366f1, #7c3aed); color: #fff; }
    .btn-outline {
      background: transparent; border: 1px solid #1e293b;
      color: #94a3b8; font-weight: 500;
    }
    .btn-outline:hover { background: #1e293b; color: #f1f5f9; }
    .score-card { background: #1e293b; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
    .score-header { display: flex; align-items: center; justify-content: space-between; }
    .job-title   { font-size: 13px; font-weight: 600; color: #f1f5f9; margin-bottom: 2px; }
    .job-company { font-size: 11px; color: #64748b; }
    .score-circle {
      width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-weight: 800; border: 2px solid;
    }
    .score-circle .num { font-size: 20px; line-height: 1; }
    .score-circle .pct { font-size: 9px; }
    .score-high { background: rgba(16,185,129,0.12); color: #10b981; border-color: #10b981; }
    .score-med  { background: rgba(245,158,11,0.12); color: #f59e0b; border-color: #f59e0b; }
    .score-low  { background: rgba(239,68,68,0.12);  color: #ef4444; border-color: #ef4444; }
    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
    .tag { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; }
    .tag-strength { background: rgba(16,185,129,0.15); color: #10b981; }
    .tag-gap      { background: rgba(239,68,68,0.12);  color: #ef4444; }
    .actions { display: flex; gap: 8px; margin-bottom: 6px; }
    .actions .btn { flex: 1; }
    .status {
      padding: 10px 12px; border-radius: 8px;
      font-size: 12px; line-height: 1.5; margin-bottom: 12px;
    }
    .status-loading { background: #1e293b; color: #94a3b8; }
    .status-error   { background: rgba(239,68,68,0.08); color: #ef4444; }
    .footer {
      padding: 9px 16px; border-top: 1px solid #1e293b;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer a       { font-size: 11px; color: #6366f1; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .connected    { font-size: 11px; color: #10b981; }
    .disconnected { font-size: 11px; color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖</div>
    <div class="header-text">
      <h1>Job Agent Co-Pilot</h1>
      <p>Auto-fill · 20+ ATS platforms</p>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="footer">
    <span id="connection-status" class="disconnected">Not connected</span>
    <a href="#" id="open-dashboard">Open Dashboard →</a>
  </div>
  <script src="src/popup.js"></script>
</body>
</html>
