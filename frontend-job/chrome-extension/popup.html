<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 { font-size: 16px; font-weight: 700; }
    .header p { font-size: 11px; opacity: 0.8; }

    .logo {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .content { padding: 16px 20px; }

    /* Settings form */
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    input {
      width: 100%; padding: 8px 10px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; color: #f1f5f9; font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #667eea; }

    .btn {
      width: 100%; padding: 9px;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
    .btn-outline { background: transparent; border: 1px solid #334155; color: #94a3b8; margin-top: 6px; }

    /* Score display */
    .score-card {
      background: #1e293b;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #334155;
    }

    .score-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .score-title { font-size: 12px; color: #94a3b8; }

    .score-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-weight: 800;
    }
    .score-circle .num { font-size: 22px; line-height: 1; }
    .score-circle .pct { font-size: 10px; }

    .score-high { background: rgba(16,185,129,0.2); color: #10b981; border: 2px solid #10b981; }
    .score-med  { background: rgba(245,158,11,0.2); color: #f59e0b; border: 2px solid #f59e0b; }
    .score-low  { background: rgba(239,68,68,0.2);  color: #ef4444; border: 2px solid #ef4444; }

    .job-info { font-size: 13px; }
    .job-title { font-weight: 600; margin-bottom: 2px; }
    .job-company { font-size: 12px; color: #94a3b8; }

    .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
    .tag {
      padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 500;
    }
    .tag-strength { background: rgba(16,185,129,0.2); color: #10b981; }
    .tag-gap      { background: rgba(239,68,68,0.2);  color: #ef4444; }

    .actions { display: flex; gap: 8px; margin-top: 12px; }
    .actions .btn { flex: 1; padding: 8px; font-size: 12px; }

    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      margin-bottom: 10px;
    }
    .status-loading { background: #1e293b; color: #94a3b8; }
    .status-error   { background: rgba(239,68,68,0.1); color: #ef4444; }

    .footer {
      padding: 10px 20px;
      border-top: 1px solid #1e293b;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer a { font-size: 11px; color: #667eea; text-decoration: none; }
    .connected { font-size: 11px; color: #10b981; }
    .disconnected { font-size: 11px; color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🤖</div>
    <div>
      <h1>Job Agent</h1>
      <p>AI Job Match Scorer</p>
    </div>
  </div>

  <div class="content" id="content">
    <!-- Dynamically rendered by popup.js -->
  </div>

  <div class="footer">
    <span id="connection-status" class="disconnected">Not connected</span>
    <a href="#" id="open-dashboard">Open Dashboard →</a>
  </div>

  <script src="src/popup.js"></script>
</body>
</html>
